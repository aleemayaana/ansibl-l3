---
- name: Verify IP forwarding is active
  ansible.builtin.command: sysctl net.ipv4.ip_forward
  register: ip_fwd_check
  changed_when: false

- name: Assert IP forwarding enabled
  ansible.builtin.assert:
    that:
      - "'net.ipv4.ip_forward = 1' in ip_fwd_check.stdout"

- name: Verify SSH hardening settings applied
  ansible.builtin.command: grep "^MaxAuthTries 3" /etc/ssh/sshd_config
  register: ssh_check
  changed_when: false
  failed_when: ssh_check.rc != 0

- name: Verify OpenVPN service is running
  ansible.builtin.service_facts:

- name: Assert OpenVPN active
  ansible.builtin.assert:
    that:
      - "'openvpn' in services"
