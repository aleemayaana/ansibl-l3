---
- name: Check Terraform binary available
  ansible.builtin.command: terraform version
  register: tf_check
  changed_when: false
  ignore_errors: true

- name: Warn if Terraform not installed
  ansible.builtin.debug:
    msg: "Terraform not found - will install"
  when: tf_check.rc != 0

- name: Check git is available
  ansible.builtin.command: git --version
  register: git_check
  changed_when: false
  failed_when: git_check.rc != 0

- name: Verify cloud credentials are set
  ansible.builtin.assert:
    that:
      - lookup('env', 'AWS_ACCESS_KEY_ID') != '' or
        lookup('env', 'ARM_CLIENT_ID') != '' or
        lookup('env', 'GOOGLE_CREDENTIALS') != ''
    fail_msg: "No cloud provider credentials found in environment"
  ignore_errors: true
