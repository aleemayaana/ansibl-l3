---
- name: Check minimum 2 CPUs
  ansible.builtin.assert:
    that:
      - ansible_processor_vcpus >= 2
    fail_msg: "Kubernetes requires minimum 2 CPUs"

- name: Check minimum 2GB RAM
  ansible.builtin.assert:
    that:
      - ansible_memtotal_mb >= 1800
    fail_msg: "Kubernetes requires minimum 2GB RAM"

- name: Verify swap is disabled
  ansible.builtin.command: swapon --show
  register: swap_check
  changed_when: false

- name: Warn if swap is enabled
  ansible.builtin.debug:
    msg: "WARNING: Swap is enabled and will be disabled for Kubernetes"
  when: swap_check.stdout != ""

- name: Check required ports are free
  ansible.builtin.wait_for:
    port: "{{ item }}"
    state: stopped
    timeout: 5
  loop: [6443, 2379, 2380, 10250, 10259, 10257]
  ignore_errors: true
